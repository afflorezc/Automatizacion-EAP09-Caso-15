serenity {
    take.screenshots = FOR_FAILURES
    use.unique.browser = true
    test.root = co.edu.udea.certificacion.reservasservicios.moduloIngreso
    console.colors = true
    report {
        accessibility = true
    }
    requirement {
        types = "epic, feature"
    }
}

#headless.mode = true

webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
  }
}

chrome.switches = """--start-maximized;--test-type;--no-sandbox;--ignore-certificate-errors;
                   --disable-popup-blocking;--disable-default-apps;--disable-extensions-file-access-check;
                   --incognito;--disable-infobars,--disable-gpu;--remote-allow-origins=*;
                   --disable-extensions"""

pages {
    registrationUrl="https://reservas-de-servicios.vercel.app/register"
    logInUrl="https://reservas-de-servicios.vercel.app/login"
    serviceRegistrationUrl="https://reservas-de-servicios.vercel.app/dashboard"
}